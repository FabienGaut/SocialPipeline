<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --pad: 64px;
    --text-color: #ffffff;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: {W}px;
    height: {H}px;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--text-color);
    overflow: hidden;
  }

  .frame {
    position: relative;
    width: {W}px;
    height: {H}px;
    background-image: url("{bg}");
    background-size: cover;
    background-position: center;
    background-color: #0b1220;
  }

  /* Overlay plus sombre pour focus storytelling */
  .overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      circle at 30% 20%,
      rgba(0,0,0,0.25) 0%,
      rgba(10, 14, 30, 0.75) 60%,
      rgba(10, 14, 30, 0.95) 100%
    );
  }

  .content {
    position: absolute;
    left: var(--pad);
    right: var(--pad);
    bottom: var(--pad);
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .tag {
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.7;
    font-weight: 500;
  }

  /* Hook storytelling fort */
  .hook {
    font-weight: 700;
    font-size: 52px;
    line-height: 1.12;
    letter-spacing: -0.02em;
    max-width: 90%;
  }

  /* Narrative block */
  .story {
    font-weight: 400;
    font-size: 26px;
    line-height: 1.55;
    opacity: 0.92;
    max-width: 85%;
  }

  .divider {
    width: 120px;
    height: 2px;
    background: rgba(255,255,255,0.8);
    border-radius: 2px;
  }

  /* Micro tension / punchline */
  .punch {
    font-weight: 600;
    font-size: 22px;
    opacity: 0.95;
  }

  .footer {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.6;
    letter-spacing: 0.08em;
  }

</style>
</head>

<body>
  <div class="frame">
    <div class="overlay"></div>

    <div class="content">

      <!-- Type de contenu -->
      <div class="tag">{tag}</div>

      <!-- Hook principal (story opening) -->
      <div class="hook">{hook}</div>

      <div class="divider"></div>

      <!-- Narration -->
      <div class="story">{story}</div>

      <!-- Punchline finale (optionnelle mais puissante) -->
      <div class="punch">{punch}</div>

      <!-- Signature -->
      <div class="footer">{footer}</div>

    </div>
  </div>
</body>
</html>
