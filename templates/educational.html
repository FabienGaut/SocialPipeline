<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --pad: 64px;
    --text-color: #ffffff;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: {W}px;
    height: {H}px;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--text-color);
    overflow: hidden;
  }

  .frame {
    position: relative;
    width: {W}px;
    height: {H}px;
    background-image: url("{bg}");
    background-size: cover;
    background-position: center;
    background-color: #0b1220;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10, 14, 30, 0.35) 0%,
      rgba(10, 14, 30, 0.85) 70%,
      rgba(10, 14, 30, 0.95) 100%
    );
  }

  .content {
    position: absolute;
    left: var(--pad);
    right: var(--pad);
    bottom: var(--pad);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .tag {
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.7;
    font-weight: 500;
  }

  .title {
    font-weight: 800;
    font-size: 54px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    max-width: 90%;
  }

  .step {
    font-weight: 500;
    font-size: 24px;
    line-height: 1.5;
    opacity: 0.92;
    max-width: 85%;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
  }

  .step-line {
    font-size: 22px;
    opacity: 0.9;
  }

  .footer {
    font-size: 14px;
    opacity: 0.6;
    letter-spacing: 0.08em;
    margin-top: 10px;
  }

</style>
</head>

<body>
  <div class="frame">
    <div class="overlay"></div>

    <div class="content">

      <div class="tag">{tag}</div>

      <!-- Title / concept -->
      <div class="title">{title}</div>

      <!-- Main explanation -->
      <div class="step">{intro}</div>

      <!-- Structured learning points -->
      <div class="steps">
        <div class="step-line">{step1}</div>
        <div class="step-line">{step2}</div>
        <div class="step-line">{step3}</div>
      </div>

      <div class="footer">{footer}</div>

    </div>
  </div>
</body>
</html>
